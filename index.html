<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>客戶生產進度表 - 黑魂進階版 v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #000000; -webkit-tap-highlight-color: transparent; color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 讓深色模式下的日期圖示變成白色 */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-black">

    <div id="root" class="flex flex-col items-center justify-center min-h-screen text-gray-400 font-bold p-6 text-center">
        <div class="animate-pulse mb-4 text-[22px]">與雲端同步中...</div>
        <div class="text-[16px] text-red-500 font-normal mt-4" id="error-fallback"></div>
    </div>

    <script>
        window.addEventListener('error', function(event) {
            document.getElementById('error-fallback').innerText = '發生錯誤: ' + event.message;
        });
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        let db = null;
        let firebaseInitialized = false;

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyCFwTYLLNAC0rOt6glzlgyN1ZMBFPsCzh0",
                authDomain: "workdate-f1043.firebaseapp.com",
                projectId: "workdate-f1043",
                storageBucket: "workdate-f1043.firebasestorage.app",
                messagingSenderId: "806117412135",
                appId: "1:806117412135:web:cf02ed13fe62f5b6f7ad02"
            };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            firebaseInitialized = true;
        } catch (error) { console.error("Firebase 失敗:", error); }

        const toPairs = (dozens, pairs) => (parseInt(dozens) || 0) * 12 + (parseInt(pairs) || 0);
        const formatPairs = (totalPairs) => {
            if (!totalPairs) return '0 雙';
            const d = Math.floor(totalPairs / 12);
            const p = totalPairs % 12;
            if (d > 0 && p > 0) return `${d} 打 ${p} 雙`;
            if (d > 0) return `${d} 打`;
            return `${p} 雙`;
        };

        const formatDisplayTime = (dStr, tStr) => {
            if (!dStr) return '';
            try {
                const [y, m, d] = dStr.split('-');
                if (!tStr) return `${parseInt(m, 10)}月${parseInt(d, 10)}日`; 
                const [hr, min] = tStr.split(':');
                const h = parseInt(hr, 10);
                const ampm = h >= 12 ? '下午' : '上午';
                const h12 = h % 12 || 12;
                return `${parseInt(m, 10)}月${parseInt(d, 10)}日 ${ampm}${String(h12).padStart(2,'0')}:${min}`;
            } catch(e) { return dStr; }
        };

        function App() {
            if (!firebaseInitialized) return <div className="text-red-500 p-10 text-center text-[18px]">資料庫連線失敗</div>;

            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('active'); 
            
            const [modalConfig, setModalConfig] = useState({ isOpen: false, mode: 'add', editId: null });
            const [customer, setCustomer] = useState('');
            const [productName, setProductName] = useState('');
            const [targetDozens, setTargetDozens] = useState('');
            const [targetPairsInput, setTargetPairsInput] = useState('');
            const [imageSrc, setImageSrc] = useState('');
            const [isCompressing, setIsCompressing] = useState(false);

            const [actionModal, setActionModal] = useState({ isOpen: false, type: '', order: null });
            const [actionDozens, setActionDozens] = useState('');
            const [actionPairs, setActionPairs] = useState('');

            const [historyModal, setHistoryModal] = useState({ isOpen: false, type: '', order: null });
            
            const [editLogModal, setEditLogModal] = useState({ 
                isOpen: false, orderId: '', type: '', logId: '', 
                dozens: '', pairs: '', dateString: '' 
            });

            const [zoomImage, setZoomImage] = useState(null);

            useEffect(() => {
                const unsubscribe = db.collection('orders').onSnapshot(snapshot => {
                    setOrders(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, error => setLoading(false));
                return () => unsubscribe();
            }, []);

            const uniqueCustomers = useMemo(() => [...new Set(orders.map(o => o.customer).filter(Boolean))], [orders]);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 800;
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        setImageSrc(canvas.toDataURL('image/jpeg', 0.6));
                        setIsCompressing(false);
                    };
                };
            };

            const openAddModal = () => {
                setModalConfig({ isOpen: true, mode: 'add', editId: null });
                setCustomer(''); setProductName(''); setTargetDozens(''); setTargetPairsInput(''); setImageSrc('');
            };

            const openEditModal = (order) => {
                setModalConfig({ isOpen: true, mode: 'edit', editId: order.id });
                setCustomer(order.customer || '');
                setProductName(order.productName || '');
                setTargetDozens(Math.floor((order.targetPairs || 0) / 12));
                setTargetPairsInput((order.targetPairs || 0) % 12);
                setImageSrc(order.imageUrl || '');
            };

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                const totalTarget = toPairs(targetDozens, targetPairsInput);
                if (!customer || !productName || totalTarget <= 0) return alert('請填寫完整資訊');

                const data = {
                    customer, productName, targetPairs: totalTarget, imageUrl: imageSrc,
                    date: new Date().toISOString().split('T')[0]
                };

                try {
                    if (modalConfig.mode === 'add') {
                        await db.collection('orders').add({ 
                            ...data, 
                            sewingPairs: 0, deliveredPairs: 0, 
                            sewingLogs: [], deliveryLogs: [], 
                            status: 'active' 
                        });
                    } else {
                        await db.collection('orders').doc(modalConfig.editId).update(data);
                    }
                    setModalConfig({ isOpen: false, mode: 'add', editId: null });
                } catch (err) { alert("操作失敗"); }
            };

            const handleActionSubmit = async (e) => {
                e.preventDefault();
                const addedPairs = toPairs(actionDozens, actionPairs);
                if (addedPairs <= 0) return alert('請輸入大於 0 的數量');
                
                const { type, order } = actionModal;
                const fieldTotal = type === 'sewing' ? 'sewingPairs' : 'deliveredPairs';
                const fieldArray = type === 'sewing' ? 'sewingLogs' : 'deliveryLogs';
                
                const now = new Date();
                const dateString = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                const timeString = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

                const newLog = {
                    id: Date.now().toString(),
                    dateString, 
                    timeString, 
                    timestamp: formatDisplayTime(dateString, timeString),
                    pairs: addedPairs
                };

                const currentLogs = order[fieldArray] || [];
                const currentTotal = Number(order[fieldTotal]) || 0;

                try {
                    await db.collection('orders').doc(order.id).update({ 
                        [fieldTotal]: currentTotal + addedPairs,
                        [fieldArray]: [...currentLogs, newLog]
                    });
                    setActionModal({ isOpen: false, type: '', order: null });
                    setActionDozens(''); setActionPairs('');
                } catch (err) { alert("更新失敗"); }
            };

            const deleteLog = async (logId, pairsToRemove) => {
                if(!confirm('確定要刪除這筆紀錄嗎？總數量將會自動扣除。')) return;

                const { order, type } = historyModal;
                const fieldTotal = type === 'sewing' ? 'sewingPairs' : 'deliveredPairs';
                const fieldArray = type === 'sewing' ? 'sewingLogs' : 'deliveryLogs';
                
                const currentLogs = order[fieldArray] || [];
                const currentTotal = Number(order[fieldTotal]) || 0;
                
                const updatedLogs = currentLogs.filter(log => log.id !== logId);
                const updatedTotal = Math.max(0, currentTotal - pairsToRemove);

                try {
                    await db.collection('orders').doc(order.id).update({ 
                        [fieldTotal]: updatedTotal,
                        [fieldArray]: updatedLogs
                    });
                    setHistoryModal({...historyModal, order: {...order, [fieldTotal]: updatedTotal, [fieldArray]: updatedLogs}});
                } catch (err) { alert("刪除失敗"); }
            };

            const openEditLog = (log) => {
                const now = new Date();
                const fallbackDate = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                
                setEditLogModal({
                    isOpen: true,
                    orderId: historyModal.order.id,
                    type: historyModal.type,
                    logId: log.id,
                    dozens: Math.floor(log.pairs / 12),
                    pairs: log.pairs % 12,
                    dateString: log.dateString || fallbackDate
                });
            };

            const submitEditLog = async (e) => {
                e.preventDefault();
                const newPairs = toPairs(editLogModal.dozens, editLogModal.pairs);
                if(newPairs < 0) return alert("數量不能小於0");

                const { order, type } = historyModal;
                const fieldTotal = type === 'sewing' ? 'sewingPairs' : 'deliveredPairs';
                const fieldArray = type === 'sewing' ? 'sewingLogs' : 'deliveryLogs';
                
                const currentLogs = order[fieldArray] || [];
                const oldLog = currentLogs.find(l => l.id === editLogModal.logId);
                if(!oldLog) return;

                const difference = newPairs - oldLog.pairs;
                const newTotal = Number(order[fieldTotal]) + difference;

                const updatedLogs = currentLogs.map(log => 
                    log.id === editLogModal.logId ? { 
                        ...log, 
                        pairs: newPairs,
                        dateString: editLogModal.dateString,
                        timestamp: formatDisplayTime(editLogModal.dateString, log.timeString)
                    } : log
                );

                try {
                    await db.collection('orders').doc(order.id).update({ 
                        [fieldTotal]: newTotal,
                        [fieldArray]: updatedLogs
                    });
                    setEditLogModal({ isOpen: false, orderId: '', type: '', logId: '', dozens: '', pairs: '', dateString: '' });
                    setHistoryModal({...historyModal, order: {...order, [fieldTotal]: newTotal, [fieldArray]: updatedLogs}});
                } catch (err) { alert("修改失敗"); }
            };

            const archiveOrder = async (id) => { if(confirm('確定要結案歸檔嗎？')) await db.collection('orders').doc(id).update({ status: 'archived' }); };
            const unarchiveOrder = async (id) => { await db.collection('orders').doc(id).update({ status: 'active' }); };
            const deleteOrder = async (id) => { if(confirm('確定要永久刪除嗎？')) await db.collection('orders').doc(id).delete(); };

            const { groupedOrders, sortedCustomers } = useMemo(() => {
                const filtered = orders.filter(o => o.status === activeTab);
                const groups = {};
                filtered.forEach(o => { (groups[o.customer] = groups[o.customer] || []).push(o); });
                const sortedKeys = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'zh-TW'));
                sortedKeys.forEach(k => groups[k].sort((a, b) => new Date(b.date) - new Date(a.date)));
                return { groupedOrders: groups, sortedCustomers: sortedKeys };
            }, [orders, activeTab]);

            if (loading) return <div className="min-h-screen bg-black flex items-center justify-center text-gray-400 text-[18px]">載入雲端中...</div>;

            return (
                <div className="min-h-screen bg-gray-950 w-full sm:max-w-md mx-auto shadow-2xl flex flex-col sm:border-x border-gray-800">
                    <datalist id="customer-options">{uniqueCustomers.map((c, i) => <option key={i} value={c} />)}</datalist>

                    <header className="bg-gray-950/90 backdrop-blur-md px-3 pt-8 pb-4 sticky top-0 z-20 border-b border-gray-800">
                        <div className="flex justify-between items-center mb-5 px-1">
                            <h1 className="text-[26px] font-bold text-white tracking-tighter">客戶生產進度表</h1>
                            <span className="text-[12px] bg-emerald-600 text-white px-2 py-0.5 rounded-full animate-pulse">LIVE</span>
                        </div>
                        <div className="flex bg-gray-800 p-1 rounded-xl">
                            {['active', 'archived'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-3 text-[16px] font-bold rounded-lg transition-all ${activeTab === tab ? 'bg-gray-700 text-white shadow-sm' : 'text-gray-500'}`}>
                                    {tab === 'active' ? '進行中' : '已歸檔'}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 px-2 py-4 pb-24 space-y-8">
                        {sortedCustomers.map(name => (
                            <div key={name} className="space-y-4">
                                <div className="flex items-center gap-2 pb-2 border-b border-gray-800 sticky top-[125px] bg-gray-950/95 z-10 py-2 px-1">
                                    <h2 className="text-[20px] font-black text-white">{name}</h2>
                                    <span className="text-[12px] bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full">{groupedOrders[name].length} 單</span>
                                </div>

                                {groupedOrders[name].map(order => {
                                    const safeTarget = Number(order.targetPairs) || 1; 
                                    const safeSewing = Number(order.sewingPairs) || 0;
                                    const safeDelivered = Number(order.deliveredPairs) || 0;
                                    const sewP = Math.min(100, (safeSewing / safeTarget) * 100) || 0;
                                    const delP = Math.min(100, (safeDelivered / safeTarget) * 100) || 0;

                                    return (
                                        <div key={order.id} className="bg-gray-900 border border-gray-800 rounded-2xl p-4 relative overflow-hidden shadow-xl">
                                            
                                            {/* 新版修改工單按鈕 */}
                                            <button onClick={() => openEditModal(order)} className="absolute top-3 right-3 bg-gray-800/80 text-gray-300 px-3 py-1.5 rounded-lg hover:bg-gray-700 hover:text-white transition-colors z-10 flex items-center gap-1 text-[14px] shadow-lg border border-gray-700 backdrop-blur-sm">
                                                📝 修改工單
                                            </button>

                                            {order.imageUrl && (
                                                <img 
                                                    src={order.imageUrl} 
                                                    onClick={() => setZoomImage(order.imageUrl)}
                                                    className="w-full h-36 object-cover rounded-xl mb-4 bg-black border border-gray-800 cursor-pointer hover:opacity-80 active:scale-[0.99] transition-all" 
                                                    alt="產品款式"
                                                />
                                            )}
                                            
                                            <div className="mb-4 pr-8">
                                                <span className="text-[12px] text-gray-500 uppercase tracking-widest font-bold">產品款式</span>
                                                <h3 className="text-[22px] font-bold text-white mt-1 leading-tight">{order.productName || '未命名'}</h3>
                                                <p className="text-[12px] text-gray-600 font-mono mt-1">{order.date}</p>
                                            </div>

                                            <div className="space-y-4 pt-4 border-t border-gray-800">
                                                <div className="flex justify-between items-end"><span className="text-[14px] text-gray-500">目標</span><span className="text-[18px] font-bold text-gray-200">{formatPairs(order.targetPairs)}</span></div>
                                                
                                                <div onClick={() => setHistoryModal({isOpen: true, type: 'sewing', order: order})} className="cursor-pointer group hover:bg-gray-800/50 p-2 -mx-2 rounded-lg transition-colors">
                                                    <div className="flex justify-between text-[16px] mb-1 items-center">
                                                        <span className="text-amber-500 font-bold flex items-center gap-1">加工中 <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 opacity-50 group-hover:opacity-100" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clipRule="evenodd" /></svg></span>
                                                        <span className="text-amber-500 font-black text-[18px]">{formatPairs(safeSewing)}</span>
                                                    </div>
                                                    <div className="w-full bg-gray-800 h-1.5 rounded-full"><div className="bg-amber-500 h-full rounded-full transition-all" style={{width: `${sewP}%`}}></div></div>
                                                </div>
                                                
                                                <div onClick={() => setHistoryModal({isOpen: true, type: 'deliver', order: order})} className="cursor-pointer group hover:bg-gray-800/50 p-2 -mx-2 rounded-lg transition-colors">
                                                    <div className="flex justify-between text-[16px] mb-1 items-center">
                                                        <span className="text-emerald-500 font-bold flex items-center gap-1">已交貨 <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 opacity-50 group-hover:opacity-100" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clipRule="evenodd" /></svg></span>
                                                        <span className="text-emerald-500 font-black text-[18px]">{formatPairs(safeDelivered)}</span>
                                                    </div>
                                                    <div className="w-full bg-gray-800 h-1.5 rounded-full"><div className="bg-emerald-500 h-full rounded-full transition-all" style={{width: `${delP}%`}}></div></div>
                                                </div>
                                            </div>

                                            {activeTab === 'active' ? (
                                                <div className="mt-4 pt-4 border-t border-gray-800 space-y-3">
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <button onClick={() => setActionModal({isOpen: true, type: 'sewing', order: order})} className="bg-amber-900/30 text-amber-500 border border-amber-900 py-3 rounded-xl text-[14px] font-bold active:scale-95 transition-all">+ 記發包</button>
                                                        <button onClick={() => setActionModal({isOpen: true, type: 'deliver', order: order})} className="bg-emerald-900/30 text-emerald-500 border border-emerald-900 py-3 rounded-xl text-[14px] font-bold active:scale-95 transition-all">+ 記交貨</button>
                                                    </div>
                                                    <button onClick={() => archiveOrder(order.id)} className="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 py-3 rounded-xl text-[14px] font-bold active:scale-95 transition-all">結案歸檔</button>
                                                </div>
                                            ) : (
                                                <div className="mt-6 pt-4 border-t border-gray-800 grid grid-cols-2 gap-2">
                                                    <button onClick={() => unarchiveOrder(order.id)} className="bg-gray-800 text-gray-300 py-3 rounded-xl text-[14px] font-bold">還原進行</button>
                                                    <button onClick={() => deleteOrder(order.id)} className="bg-red-900/30 text-red-500 border border-red-900 py-3 rounded-xl text-[14px] font-bold">永久刪除</button>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </main>

                    {activeTab === 'active' && <button onClick={openAddModal} className="fixed bottom-8 right-8 w-14 h-14 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-[32px] font-light active:scale-90 transition-all z-30">＋</button>}

                    {modalConfig.isOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end justify-center">
                            <div className="bg-gray-900 w-full max-w-md rounded-t-[2.5rem] p-8 animate-slide-up border-t border-gray-800">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-[22px] font-bold text-white">{modalConfig.mode === 'add' ? '建立新工單' : '修改工單內容'}</h2>
                                    <button type="button" onClick={() => setModalConfig({isOpen: false})} className="text-gray-500 text-[26px] px-2">✕</button>
                                </div>
                                <form onSubmit={handleFormSubmit} className="space-y-5">
                                    <div><label className="text-[12px] font-bold text-gray-500 block mb-2 tracking-widest">客戶名稱</label>
                                    <input type="text" list="customer-options" value={customer} onChange={e => setCustomer(e.target.value)} className="w-full bg-gray-800 border-none rounded-xl py-4 px-4 text-white text-[16px] focus:ring-2 focus:ring-white transition-all" /></div>
                                    <div><label className="text-[12px] font-bold text-gray-500 block mb-2 tracking-widest">產品名稱 (款式)</label>
                                    <input type="text" value={productName} onChange={e => setProductName(e.target.value)} className="w-full bg-gray-800 border-none rounded-xl py-4 px-4 text-white font-bold text-[16px]" /></div>
                                    <div><label className="text-[12px] font-bold text-gray-500 block mb-2 tracking-widest">總目標數量</label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="relative"><input type="number" min="0" value={targetDozens} onChange={e => setTargetDozens(e.target.value)} className="w-full bg-gray-800 border-none rounded-xl py-4 pl-4 pr-10 text-white font-bold text-right text-[16px]" /><span className="absolute right-3 top-4 text-gray-500 text-[14px]">打</span></div>
                                        <div className="relative"><input type="number" min="0" max="11" value={targetPairsInput} onChange={e => setTargetPairsInput(e.target.value)} className="w-full bg-gray-800 border-none rounded-xl py-4 pl-4 pr-10 text-white font-bold text-right text-[16px]" /><span className="absolute right-3 top-4 text-gray-500 text-[14px]">雙</span></div>
                                    </div></div>
                                    <div><label className="text-[12px] font-bold text-gray-500 block mb-2 tracking-widest">產品拍照</label>
                                    <div className="relative border-2 border-dashed border-gray-700 rounded-2xl p-4 text-center bg-gray-800/50">
                                        <input type="file" accept="image/*" onChange={handleImageChange} className="absolute inset-0 opacity-0" />
                                        {imageSrc ? <img src={imageSrc} className="h-20 mx-auto rounded-lg" /> : <p className="text-gray-500 text-[14px]">{isCompressing ? "壓縮中..." : "點擊上傳照片"}</p>}
                                    </div></div>
                                    <button type="submit" disabled={isCompressing} className="w-full bg-white text-black py-4 rounded-xl font-bold text-[18px] mt-4 active:scale-95 transition-all">儲存</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {actionModal.isOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6 z-[60]">
                            <div className="bg-gray-900 w-full max-w-sm rounded-[2rem] p-8 border border-gray-800 shadow-2xl">
                                <h2 className="text-[20px] font-bold text-white text-center mb-6">{actionModal.type === 'sewing' ? '📥 紀錄發包' : '📤 紀錄交貨'}</h2>
                                <form onSubmit={handleActionSubmit} className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="text-center"><label className="text-[12px] text-gray-500 block mb-2">打</label><input type="number" min="0" autoFocus value={actionDozens} onChange={e => setActionDozens(e.target.value)} className="w-full bg-gray-800 rounded-xl py-4 text-center text-[26px] font-black text-white" /></div>
                                        <div className="text-center"><label className="text-[12px] text-gray-500 block mb-2">雙</label><input type="number" min="0" max="11" value={actionPairs} onChange={e => setActionPairs(e.target.value)} className="w-full bg-gray-800 rounded-xl py-4 text-center text-[26px] font-black text-white" /></div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setActionModal({isOpen:false})} className="flex-1 bg-gray-800 text-gray-400 py-4 rounded-xl font-bold text-[16px]">取消</button>
                                        <button type="submit" className={`flex-1 py-4 rounded-xl font-bold text-white text-[16px] ${actionModal.type === 'sewing' ? 'bg-amber-600' : 'bg-emerald-600'}`}>確認累加</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {historyModal.isOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[50] flex items-end justify-center">
                            <div className="bg-gray-900 w-full max-w-md rounded-t-[2.5rem] p-6 animate-slide-up border-t border-gray-800 max-h-[85vh] flex flex-col">
                                <div className="flex justify-between items-center mb-4 shrink-0">
                                    <h2 className="text-[20px] font-bold text-white">
                                        {historyModal.type === 'sewing' ? '加工發包紀錄' : '完工交貨紀錄'}
                                    </h2>
                                    <button type="button" onClick={() => setHistoryModal({isOpen: false})} className="text-gray-500 text-[26px] px-2">✕</button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto pr-2 space-y-3">
                                    {historyModal.order && (historyModal.order[historyModal.type === 'sewing' ? 'sewingLogs' : 'deliveryLogs'] || []).length === 0 ? (
                                        <p className="text-gray-600 text-center py-10 text-[16px]">尚無任何紀錄</p>
                                    ) : (
                                        (historyModal.order[historyModal.type === 'sewing' ? 'sewingLogs' : 'deliveryLogs'] || []).map((log) => (
                                            <div key={log.id} className="bg-gray-800 p-4 rounded-xl flex items-center justify-between border border-gray-700">
                                                <div>
                                                    <p className={`font-bold text-[16px] ${historyModal.type === 'sewing' ? 'text-amber-500' : 'text-emerald-500'}`}>
                                                        {formatPairs(log.pairs)}
                                                    </p>
                                                    <p className="text-[12px] text-gray-500 mt-1">{log.timestamp}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => openEditLog(log)} className="bg-gray-700 text-gray-300 p-2 rounded-lg text-[14px] font-bold hover:bg-gray-600">修改</button>
                                                    <button onClick={() => deleteLog(log.id, log.pairs)} className="bg-red-900/30 text-red-500 p-2 rounded-lg text-[14px] font-bold hover:bg-red-900/50">刪除</button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {editLogModal.isOpen && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6">
                            <div className="bg-gray-800 w-full max-w-sm rounded-3xl p-6 border border-gray-700 shadow-2xl">
                                <h3 className="text-white font-bold text-center mb-6 text-[20px]">修改單筆紀錄</h3>
                                <form onSubmit={submitEditLog} className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="text-center">
                                            <label className="text-[12px] text-gray-500 block mb-2 font-bold tracking-widest">打</label>
                                            <input type="number" min="0" value={editLogModal.dozens} onChange={e=>setEditLogModal({...editLogModal, dozens: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl py-3 text-center text-[22px] font-black text-white focus:outline-none focus:border-gray-500" />
                                        </div>
                                        <div className="text-center">
                                            <label className="text-[12px] text-gray-500 block mb-2 font-bold tracking-widest">雙</label>
                                            <input type="number" min="0" max="11" value={editLogModal.pairs} onChange={e=>setEditLogModal({...editLogModal, pairs: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl py-3 text-center text-[22px] font-black text-white focus:outline-none focus:border-gray-500" />
                                        </div>
                                    </div>

                                    <div className="border-t border-gray-700 pt-4">
                                        <div className="text-center">
                                            <label className="text-[12px] text-gray-500 block mb-2 font-bold tracking-widest">修改日期</label>
                                            <input type="date" value={editLogModal.dateString} onChange={e=>setEditLogModal({...editLogModal, dateString: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl py-3 px-4 text-center text-[16px] font-bold text-white focus:outline-none focus:border-gray-500" />
                                        </div>
                                    </div>

                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setEditLogModal({isOpen:false})} className="flex-1 bg-gray-700 text-gray-300 py-4 rounded-xl font-bold text-[16px]">取消</button>
                                        <button type="submit" className="flex-1 bg-white text-black py-4 rounded-xl font-bold text-[16px]">儲存修改</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {zoomImage && (
                        <div 
                            className="fixed inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-4"
                            onClick={() => setZoomImage(null)}
                        >
                            <div className="relative max-w-full max-h-[85vh] flex items-center justify-center">
                                <button 
                                    className="absolute -top-14 right-2 text-white bg-gray-900/80 hover:bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center text-[22px] font-bold border border-gray-700 transition-all shadow-xl"
                                    onClick={() => setZoomImage(null)}
                                >
                                    ✕
                                </button>
                                <img 
                                    src={zoomImage} 
                                    className="max-w-full max-h-[80vh] object-contain rounded-xl border border-gray-800 shadow-2xl" 
                                    onClick={(e) => e.stopPropagation()} 
                                    alt="圖片放大預覽"
                                />
                            </div>
                            <p className="text-gray-500 text-[14px] mt-4 tracking-wider">點擊背景任意處可返回</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
